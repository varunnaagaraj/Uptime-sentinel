# Route Sentinel — Nginx Config (HTTP only, no SSL)
# Place at: /etc/nginx/sites-available/route-sentinel
# Symlink: ln -sf /etc/nginx/sites-available/route-sentinel /etc/nginx/sites-enabled/

upstream backend {
    server backend:8001;
    keepalive 16;
}

upstream frontend {
    server frontend:3000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Replace with your domain

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:;" always;

    # Rate limiting zone (define in nginx.conf http block):
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # API routes -> backend
    location /api/ {
        # limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Playwright checks can take up to 120s
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Frontend -> Node static server / React dev
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/route-sentinel.access.log;
    error_log  /var/log/nginx/route-sentinel.error.log;
}
